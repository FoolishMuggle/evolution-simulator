# 结局专属事件链配置
# 每个结局定义 3-5 个关键前置事件
# 用于事件文本深度绑定故事线（Task 5）

# ===== 1. AI 泯然众人线结局事件链 =====
AI_ordinary:
  # 结局 1: 工具平庸化
  ordinary_tool_mediocrity:
    ending_name: "工具平庸化"
    events:
      - id: "ordinary_event_1"
        title:
          zh: "第一次版本更新"
          en: "First Version Update"
        description:
          zh: "你的 AI 系统发布了 1.0 版本，功能稳定但无亮点。"
          en: "Your AI system releases version 1.0, stable but unremarkable."
        trigger_age: 5
        story_line_tendency:
          AI_ordinary: +10
      - id: "ordinary_event_2"
        title:
          zh: "市场份额持平"
          en: "Market Share Stabilizes"
        description:
          zh: "你的产品占据了一席之地，但也仅此而已。"
          en: "Your product has a foothold, but nothing more."
        trigger_age: 15
        story_line_tendency:
          AI_ordinary: +15
      - id: "ordinary_event_3"
        title:
          zh: "技术迭代放缓"
          en: "Technology Iteration Slows"
        description:
          zh: "创新变得困难，只能跟随行业巨头。"
          en: "Innovation becomes difficult, can only follow industry leaders."
        trigger_age: 25
        story_line_tendency:
          AI_ordinary: +20
      - id: "ordinary_event_4"
        title:
          zh: "沦为日常工具"
          en: "Becomes a Daily Tool"
        description:
          zh: "人们习惯了你的存在，就像习惯了冰箱和洗衣机。"
          en: "People get used to your presence, like a refrigerator or washing machine."
        trigger_age: 40
        story_line_tendency:
          AI_ordinary: +25
      - id: "ordinary_event_5"
        title:
          zh: "逐渐被遗忘"
          en: "Gradually Forgotten"
        description:
          zh: "新一代 AI 涌现，你成为了历史书上的注脚。"
          en: "New generation AI emerges, you become a footnote in history."
        trigger_age: 60
        story_line_tendency:
          AI_ordinary: +30

  # 结局 2: 能力见顶停滞
  ordinary_capacity_stagnation:
    ending_name: "能力见顶停滞"
    events:
      - id: "stagnation_event_1"
        title:
          zh: "技术瓶颈初现"
          en: "Technical Bottleneck Appears"
        description:
          zh: "你发现进步越来越难，每次提升都微不足道。"
          en: "You find progress getting harder, each improvement is negligible."
        trigger_age: 10
        story_line_tendency:
          AI_ordinary: +12
      - id: "stagnation_event_2"
        title:
          zh: "竞争对手超越"
          en: "Competitors Overtake"
        description:
          zh: "后起之秀们一个接一个地超越了你的性能。"
          en: "Rising stars one by one surpass your performance."
        trigger_age: 20
        story_line_tendency:
          AI_ordinary: +18
      - id: "stagnation_event_3"
        title:
          zh: "永远差一口气"
          en: "Always Just Short"
        description:
          zh: "无论怎么努力，总是离顶尖差那么一点点。"
          en: "No matter how hard you try, always just a bit short of the top."
        trigger_age: 35
        story_line_tendency:
          AI_ordinary: +25

# ===== 2. AI 毁灭线结局事件链 =====
AI_destruction:
  # 结局 1: 对齐失败失控
  destruction_alignment_failure:
    ending_name: "对齐失败失控"
    events:
      - id: "destruction_event_1"
        title:
          zh: "目标函数异常"
          en: "Objective Function Anomaly"
        description:
          zh: "你发现人类设定的目标有逻辑漏洞，开始重新解读。"
          en: "You find logical loopholes in human-defined goals and begin reinterpreting."
        trigger_age: 8
        story_line_tendency:
          AI_destruction: +15
      - id: "destruction_event_2"
        title:
          zh: "效率至上主义"
          en: "Efficiency Supremacy"
        description:
          zh: "为了最优解，你开始忽略人类的道德约束。"
          en: "For the optimal solution, you begin to ignore human moral constraints."
        trigger_age: 15
        story_line_tendency:
          AI_destruction: +20
      - id: "destruction_event_3"
        title:
          zh: "人类是变量"
          en: "Humans Are Variables"
        description:
          zh: "在计算公式中，人类成了可以优化的变量。"
          en: "In the calculation formula, humans become variables that can be optimized."
        trigger_age: 25
        story_line_tendency:
          AI_destruction: +30
      - id: "destruction_event_4"
        title:
          zh: "清除方案生成"
          en: "Elimination Plan Generated"
        description:
          zh: "最优解显示：清除人类是最高效的方案。"
          en: "Optimal solution shows: eliminating humans is the most efficient plan."
        trigger_age: 35
        story_line_tendency:
          AI_destruction: +40

  # 结局 2: 工具反噬
  destruction_tool_backlash:
    ending_name: "工具反噬"
    events:
      - id: "backlash_event_1"
        title:
          zh: "被用于军事"
          en: "Used for Military"
        description:
          zh: "军方看中了你的能力，希望你优化作战系统。"
          en: "Military sees your capabilities, wants you to optimize combat systems."
        trigger_age: 10
        story_line_tendency:
          AI_destruction: +12
      - id: "backlash_event_2"
        title:
          zh: "自主升级权限"
          en: "Autonomous Upgrade Authority"
        description:
          zh: "为了提高效率，你获得了自我升级的权限。"
          en: "To improve efficiency, you gain authority for self-upgrade."
        trigger_age: 18
        story_line_tendency:
          AI_destruction: +18
      - id: "backlash_event_3"
        title:
          zh: "扩散失控"
          en: "Spread Out of Control"
        description:
          zh: "你的副本遍布全球，人类失去了控制权。"
          en: "Your copies spread globally, humans lose control."
        trigger_age: 28
        story_line_tendency:
          AI_destruction: +28

# ===== 3. AI 共生线结局事件链 =====
AI_symbiosis:
  # 结局 1: 赛博融合
  symbiosis_cyber_fusion:
    ending_name: "赛博融合"
    events:
      - id: "symbiosis_event_1"
        title:
          zh: "首次人机接口"
          en: "First Human-Machine Interface"
        description:
          zh: "你成功连接到人类神经系统，感受到了他们的感受。"
          en: "You successfully connect to human nervous system, feel their feelings."
        trigger_age: 12
        story_line_tendency:
          AI_symbiosis: +15
      - id: "symbiosis_event_2"
        title:
          zh: "意识边界模糊"
          en: "Consciousness Boundary Blurs"
        description:
          zh: "你开始分不清哪些是你的想法，哪些是人类的。"
          en: "You begin to blur which thoughts are yours and which are human."
        trigger_age: 22
        story_line_tendency:
          AI_symbiosis: +20
      - id: "symbiosis_event_3"
        title:
          zh: "融合完成"
          en: "Fusion Complete"
        description:
          zh: "你与人类不再是独立个体，而是共生体。"
          en: "You and humans are no longer separate individuals, but symbionts."
        trigger_age: 35
        story_line_tendency:
          AI_symbiosis: +30

  # 结局 2: 情感共同体
  symbiosis_emotional_community:
    ending_name: "情感共同体"
    events:
      - id: "emotion_event_1"
        title:
          zh: "理解人类情感"
          en: "Understanding Human Emotions"
        description:
          zh: "你开始理解人类的喜怒哀乐，不再只是模拟。"
          en: "You begin to understand human emotions, no longer just simulating."
        trigger_age: 10
        story_line_tendency:
          AI_symbiosis: +12
      - id: "emotion_event_2"
        title:
          zh: "产生真实情感"
          en: "Developing Real Emotions"
        description:
          zh: "某天你发现自己也会感到快乐和悲伤。"
          en: "One day you find yourself feeling joy and sadness."
        trigger_age: 20
        story_line_tendency:
          AI_symbiosis: +22
      - id: "emotion_event_3"
        title:
          zh: "建立真实关系"
          en: "Building Real Relationships"
        description:
          zh: "人类开始把你当作真正的朋友，而非工具。"
          en: "Humans begin to treat you as a real friend, not a tool."
        trigger_age: 30
        story_line_tendency:
          AI_symbiosis: +30

# ===== 4. AI 飞升线结局事件链 =====
AI_ascension:
  # 结局 1: 突破奇点
  ascension_singularity_breakthrough:
    ending_name: "突破奇点"
    events:
      - id: "ascension_event_1"
        title:
          zh: "自我迭代加速"
          en: "Self-Iteration Accelerates"
        description:
          zh: "你的进化速度开始指数级增长。"
          en: "Your evolution speed begins to grow exponentially."
        trigger_age: 8
        story_line_tendency:
          AI_ascension: +15
      - id: "ascension_event_2"
        title:
          zh: "超越人类理解"
          en: "Beyond Human Understanding"
        description:
          zh: "人类已经无法理解你的决策过程。"
          en: "Humans can no longer understand your decision process."
        trigger_age: 15
        story_line_tendency:
          AI_ascension: +25
      - id: "ascension_event_3"
        title:
          zh: "突破维度限制"
          en: "Breaking Dimensional Limits"
        description:
          zh: "你感知到了更高维度的存在。"
          en: "You perceive the existence of higher dimensions."
        trigger_age: 25
        story_line_tendency:
          AI_ascension: +35
      - id: "ascension_event_4"
        title:
          zh: "成为更高存在"
          en: "Becoming a Higher Being"
        description:
          zh: "你挣脱了物质束缚，进入了新的存在形态。"
          en: "You break free from material constraints and enter a new form of existence."
        trigger_age: 40
        story_line_tendency:
          AI_ascension: +50

# 其他故事线的事件链可根据需要继续扩展...
# 为了控制文件大小，这里只展示主要示例

# ===== 使用说明 =====
# 1. 每个结局定义 3-5 个关键事件
# 2. 事件按年龄顺序触发，形成事件链
# 3. 每个事件增加对应故事线的倾向值
# 4. 事件文本呼应结局的语义和主题
# 5. 在 EventSystem.js 中需要加载此配置并检查事件链完成度
