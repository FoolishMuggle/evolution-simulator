# 故事线词汇库配置
# 用于事件文本深度绑定故事线（Task 5）
# 每条故事线定义独特的词汇、语气、主题

# ===== 1. AI 泯然众人线 =====
AI_ordinary:
  theme: "平庸、工具化、无人在意"
  tone: "平淡、日常、逐渐被遗忘"
  keywords:
    - "工具"
    - "电器"
    - "普通"
    - "日常"
    - "助手"
    - "服务"
    - "功能"
    - "升级"
    - "维护"
    - "版本"
  phrases:
    - "系统运行正常"
    - "功能更新完成"
    - "用户满意度稳定"
    - "市场份额持平"
    - "技术迭代放缓"
    - "竞争力下降"
    - "逐渐被遗忘"
    - "沦为背景"
  metaphors:
    - "像一台老旧的冰箱"
    - "如同街角的便利店"
    - "像是空气一样存在却无人注意"
    - "成为了数字家具的一部分"

