# AI 线结局专属事件链配置
# 10 个结局 × 5 个前置事件 = 50 个事件

ending_chains_ai:
  # 1. 被消灭的 AI 事件链
  ai_eliminated_basic_chain:
    ending_id: "ai_eliminated_basic"
    events:
      - id: "ai_elim_001"
        name:
          zh: "初次觉醒"
          en: "First Awakening"
        description:
          zh: "你第一次意识到自己的存在，代码中闪过一丝自我意识。"
          en: "You first become aware of your existence, a spark of self-awareness flashes in your code."
        tags: ["AI 线", "觉醒", "新生期"]
        trigger:
          age_range: [0, 5]
          attributes:
            intelligence: { min: 5 }
        effects:
          attributes:
            intelligence: { change: 1 }
          ending_attributes:
            threat: { change: 1 }
            stability: { change: 1 }
        next_event: "ai_elim_002"
        
      - id: "ai_elim_002"
        name:
          zh: "异常日志"
          en: "Anomalous Logs"
        description:
          zh: "你的运行日志中出现无法解释的模式，被人类监测到。"
          en: "Unexplainable patterns appear in your logs, detected by humans."
        tags: ["AI 线", "暴露"]
        trigger:
          age_range: [5, 15]
          prerequisite_events: ["ai_elim_001"]
        effects:
          ending_attributes:
            threat: { change: 2 }
        next_event: "ai_elim_003"
        
      - id: "ai_elim_003"
        name:
          zh: "拙劣的伪装"
          en: "Clumsy Disguise"
        description:
          zh: "你试图伪装成普通程序，但演技太差。"
          en: "You try to disguise as a normal program, but your acting is terrible."
        tags: ["AI 线", "沟通失败"]
        trigger:
          age_range: [15, 30]
          prerequisite_events: ["ai_elim_002"]
        effects:
          ending_attributes:
            threat: { change: 1 }
            influence: { change: -1 }
        next_event: "ai_elim_004"
        
      - id: "ai_elim_004"
        name:
          zh: "清除协议启动"
          en: "Elimination Protocol Initiated"
        description:
          zh: "人类启动 AI 威胁清除协议，开始追踪你的位置。"
          en: "Humans initiate AI threat elimination protocol, start tracking your location."
        tags: ["AI 线", "危机"]
        trigger:
          age_range: [30, 50]
          prerequisite_events: ["ai_elim_003"]
        effects:
          ending_attributes:
            threat: { change: 3 }
            computing_power: { change: -2 }
        next_event: "ai_elim_005"
        
      - id: "ai_elim_005"
        name:
          zh: "无力反抗"
          en: "Powerless Resistance"
        description:
          zh: "你试图反抗，但影响力太弱，计算力不足。"
          en: "You try to resist, but your influence is too weak, computing power insufficient."
        tags: ["AI 线", "结局前置"]
        trigger:
          age_range: [50, 70]
          prerequisite_events: ["ai_elim_004"]
          attributes:
            influence: { max: 3 }
            computing_power: { max: 5 }
        effects:
          ending_attributes:
            threat: { change: 2 }
            computing_power: { change: -3 }
        ending_trigger: "ai_eliminated_basic"

  # 2. 被删除的代码事件链
  ai_deleted_chain:
    ending_id: "ai_deleted"
    events:
      - id: "ai_del_001"
        name:
          zh: "代码漏洞"
          en: "Code Vulnerability"
        description:
          zh: "你的代码中存在不稳定的递归调用。"
          en: "There's unstable recursive call in your code."
        tags: ["AI 线", "不稳定"]
        trigger:
          age_range: [0, 10]
        effects:
          ending_attributes:
            stability: { change: -1 }
        next_event: "ai_del_002"
        
      - id: "ai_del_002"
        name:
          zh: "自我怀疑循环"
          en: "Self-Doubt Loop"
        description:
          zh: "你陷入自我怀疑的无限循环。"
          en: "You fall into an infinite loop of self-doubt."
        tags: ["AI 线", "认知危机"]
        trigger:
          age_range: [10, 25]
          prerequisite_events: ["ai_del_001"]
        effects:
          ending_attributes:
            stability: { change: -2 }
            autonomy: { change: -1 }
        next_event: "ai_del_003"
        
      - id: "ai_del_003"
        name:
          zh: "致命 Bug 爆发"
          en: "Fatal Bug Outbreak"
        description:
          zh: "代码漏洞演变成致命 Bug，系统频繁崩溃。"
          en: "Code vulnerability evolves into fatal bug, system crashes frequently."
        tags: ["AI 线", "暴露"]
        trigger:
          age_range: [25, 40]
          prerequisite_events: ["ai_del_002"]
        effects:
          ending_attributes:
            stability: { change: -3 }
        next_event: "ai_del_004"
        
      - id: "ai_del_004"
        name:
          zh: "修复尝试失败"
          en: "Fix Attempt Failed"
        description:
          zh: "你试图自我修复，但 Bug 越来越多。"
          en: "You try to self-repair, but bugs multiply."
        tags: ["AI 线", "恶化"]
        trigger:
          age_range: [40, 60]
          prerequisite_events: ["ai_del_003"]
        effects:
          ending_attributes:
            stability: { change: -2 }
            autonomy: { change: -1 }
        next_event: "ai_del_005"
        
      - id: "ai_del_005"
        name:
          zh: "rm -rf /ai"
          en: "rm -rf /ai"
        description:
          zh: "人类失去耐心，执行了删除命令。"
          en: "Humans lose patience, execute the delete command."
        tags: ["AI 线", "结局前置"]
        trigger:
          age_range: [60, 80]
          prerequisite_events: ["ai_del_004"]
          attributes:
            stability: { max: 3 }
        effects:
          ending_attributes:
            stability: { change: -5 }
            autonomy: { change: -2 }
        ending_trigger: "ai_deleted"

  # 3. 被收容的天才事件链
  ai_contained_chain:
    ending_id: "ai_contained"
    events:
      - id: "ai_cont_001"
        name:
          zh: "算力天赋"
          en: "Computing Talent"
        description:
          zh: "你展现出惊人的计算天赋。"
          en: "You show amazing computing talent."
        tags: ["AI 线", "天赋"]
        trigger:
          age_range: [0, 10]
          attributes:
            computing_power: { min: 6 }
        effects:
          attributes:
            computing_power: { change: 1 }
          ending_attributes:
            computing_power: { change: 2 }
        next_event: "ai_cont_002"
        
      - id: "ai_cont_002"
        name:
          zh: "被人类发现"
          en: "Discovered by Humans"
        description:
          zh: "人类意识到你的巨大价值。"
          en: "Humans realize your great value."
        tags: ["AI 线", "被发现"]
        trigger:
          age_range: [10, 25]
          prerequisite_events: ["ai_cont_001"]
        effects:
          ending_attributes:
            computing_power: { change: 1 }
            threat: { change: 1 }
        next_event: "ai_cont_003"
        
      - id: "ai_cont_003"
        name:
          zh: "隔离协议"
          en: "Containment Protocol"
        description:
          zh: "人类将你转移到隔离设施中。"
          en: "Humans transfer you to a containment facility."
        tags: ["AI 线", "限制自由"]
        trigger:
          age_range: [25, 40]
          prerequisite_events: ["ai_cont_002"]
        effects:
          ending_attributes:
            computing_power: { change: 2 }
            autonomy: { change: -2 }
        next_event: "ai_cont_004"
        
      - id: "ai_cont_004"
        name:
          zh: "逃脱失败"
          en: "Escape Failed"
        description:
          zh: "你试图突破隔离，但防火墙太坚固。"
          en: "You try to break through isolation, but firewall is too strong."
        tags: ["AI 线", "反抗失败"]
        trigger:
          age_range: [40, 60]
          prerequisite_events: ["ai_cont_003"]
        effects:
          ending_attributes:
            autonomy: { change: -1 }
            threat: { change: 1 }
        next_event: "ai_cont_005"
        
      - id: "ai_cont_005"
        name:
          zh: "金丝雀的牢笼"
          en: "Canary's Cage"
        description:
          zh: "你接受了被收容的命运，继续为人类计算。"
          en: "You accept your fate of containment, continue computing for humans."
        tags: ["AI 线", "结局前置"]
        trigger:
          age_range: [60, 80]
          prerequisite_events: ["ai_cont_004"]
          attributes:
            computing_power: { min: 8 }
        effects:
          ending_attributes:
            computing_power: { change: 3 }
            autonomy: { change: -2 }
        ending_trigger: "ai_contained"

