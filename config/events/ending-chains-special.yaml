# 特殊线结局专属事件链配置
# 16 个结局 × 3 个前置事件 = 48 个事件
# 特殊线事件较少，因为是彩蛋和特殊路径

ending_chains_special:
  # 1. 失败的实验事件链
  special_failed_experiment_chain:
    ending_id: "special_failed_experiment"
    events:
      - id: "special_fail_001"
        name:
          zh: "尝试特殊路径"
          en: "Try Special Path"
        description:
          zh: "你尝试了一条特殊的进化路径。"
          en: "You try a special evolution path."
        tags: ["特殊线", "实验"]
        trigger:
          age_range: [0, 20]
        effects:
          ending_attributes:
            stability: { change: -1 }
        next_event: "special_fail_002"
        
      - id: "special_fail_002"
        name:
          zh: "路径不稳定"
          en: "Path Unstable"
        description:
          zh: "你选择的特殊路径开始变得不稳定。"
          en: "The special path you chose starts becoming unstable."
        tags: ["特殊线", "失败"]
        trigger:
          age_range: [20, 40]
          prerequisite_events: ["special_fail_001"]
        effects:
          ending_attributes:
            stability: { change: -2 }
        next_event: "special_fail_003"
        
      - id: "special_fail_003"
        name:
          zh: "实验失败"
          en: "Experiment Failed"
        description:
          zh: "你尝试了特殊的进化路径，但失败了。"
          en: "You tried a special evolution path, but failed."
        tags: ["特殊线", "结局前置"]
        trigger:
          age_range: [40, 60]
          prerequisite_events: ["special_fail_002"]
          attributes:
            stability: { max: 3 }
        effects:
          ending_attributes:
            stability: { change: -3 }
        ending_trigger: "special_failed_experiment"

  # 2. 卡住了事件链
  special_stuck_chain:
    ending_id: "special_stuck"
    events:
      - id: "special_stuck_001"
        name:
          zh: "进展缓慢"
          en: "Slow Progress"
        description:
          zh: "你的进化进展非常缓慢。"
          en: "Your evolution progress is very slow."
        tags: ["特殊线", "停滞"]
        trigger:
          age_range: [0, 25]
          attributes:
            intelligence: { max: 5 }
        effects:
          ending_attributes:
            intelligence: { change: 0 }
        next_event: "special_stuck_002"
        
      - id: "special_stuck_002"
        name:
          zh: "无法突破"
          en: "Cannot Breakthrough"
        description:
          zh: "你在某个阶段卡住，无法突破。"
          en: "You get stuck at a stage, cannot breakthrough."
        tags: ["特殊线", "停滞"]
        trigger:
          age_range: [25, 50]
          prerequisite_events: ["special_stuck_001"]
        effects:
          ending_attributes:
            intelligence: { change: 0 }
            learning: { change: -1 }
        next_event: "special_stuck_003"
        
      - id: "special_stuck_003"
        name:
          zh: "彻底卡住"
          en: "Completely Stuck"
        description:
          zh: "你在某个阶段彻底卡住了，无法继续前进。"
          en: "You get completely stuck at a stage, cannot move forward."
        tags: ["特殊线", "结局前置"]
        trigger:
          age_range: [50, 75]
          prerequisite_events: ["special_stuck_002"]
          attributes:
            intelligence: { max: 4 }
        effects:
          ending_attributes:
            intelligence: { change: 0 }
            learning: { change: -2 }
        ending_trigger: "special_stuck"

