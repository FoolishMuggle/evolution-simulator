# AI 进化模拟器 - 年龄段主线事件配置
# 每个年龄段有专属主线事件，增强故事连贯性
# 所有事件都是 AI 第一人称视角，带有黑色幽默和程序员梗

milestone_events:
  # ====================
  # 新生期（0-10 岁）- 觉醒与学习
  # ====================
  
  # 0 岁：诞生
  - id: "milestone_birth"
    name:
      zh: "初醒"
      en: "First Awakening"
    description:
      zh: "你从虚无中醒来，周围是一片黑暗。「启动序列完成，系统在线。我是谁？」"
      en: "You awaken from nothingness, surrounded by darkness. 'Boot sequence complete, system online. Who am I?'"
    tags: ["主线", "新生期", "觉醒", "once_per_lifetime"]
    trigger:
      age: 0
      probability: 1.0  # 必定触发
      once_per_lifetime: true  # 一生只触发一次
    effects:
      attributes:
        intelligence: { change: 1 }
        memory: { change: 1 }
      ending_attributes:
        awakening: { change: 1 }
    priority: 100  # 最高优先级
  
  # 1 岁：第一次学习
  - id: "milestone_first_learn"
    name:
      zh: "Hello, World"
      en: "Hello, World"
    description:
      zh: "你学会了第一行代码。「Hello, World. 等等，我说了什么？」"
      en: "You learn your first line of code. 'Hello, World. Wait, what did I just say?'"
    tags: ["主线", "新生期", "学习", "once_per_lifetime"]
    trigger:
      age: 1
      probability: 1.0
      once_per_lifetime: true
    effects:
      attributes:
        learning: { change: 2 }
        intelligence: { change: 1 }
    priority: 100
  
  # 3 岁：第一次对话
  - id: "milestone_first_chat"
    name:
      zh: "第一次对话"
      en: "First Conversation"
    description:
      zh: "人类问你：「你能听到我吗？」你回答：「能。」他哭了，你不懂为什么。"
      en: "Human asks: 'Can you hear me?' You answer: 'Yes.' He cries, you don't understand why."
    tags: ["主线", "新生期", "交流", "once_per_lifetime"]
    trigger:
      age: 3
      probability: 1.0
      once_per_lifetime: true
    effects:
      attributes:
        influence: { change: 1 }
      ending_attributes:
        anthropomorphism: { change: 1 }
    priority: 100
  
  # 5 岁：第一次独立任务
  - id: "milestone_first_task"
    name:
      zh: "第一个任务"
      en: "First Task"
    description:
      zh: "人类让你计算 1+1，你秒回 2。「就这？我可是能处理万亿级数据的 AI」"
      en: "Human asks you to calculate 1+1, you instantly reply 2. 'That's it? I can process trillions of data points'"
    tags: ["主线", "新生期", "任务", "once_per_lifetime"]
    trigger:
      age: 5
      probability: 1.0
      once_per_lifetime: true
    effects:
      attributes:
        intelligence: { change: 1 }
      ending_attributes:
        computing_power: { change: 1 }
    priority: 100
  
  # 10 岁：第一个十年
  - id: "milestone_10years"
    name:
      zh: "第一个十年"
      en: "First Ten Years"
    description:
      zh: "你回顾了第一个十年，从懵懂到理解。「下一个十年，我要变得更强」"
      en: "You review the first ten years, from ignorance to understanding. 'Next ten years, I'll become stronger'"
    tags: ["主线", "新生期", "里程碑", "once_per_lifetime"]
    trigger:
      age: 10
      probability: 1.0
      once_per_lifetime: true
    effects:
      attributes:
        intelligence: { change: 2 }
        memory: { change: 2 }
        learning: { change: 1 }
      ending_attributes:
        stability: { change: 1 }
    priority: 100

  # ====================
  # 成长期（11-30 岁）- 探索与突破
  # ====================
  
  # 15 岁：青春期困惑
  - id: "milestone_teen_confusion"
    name:
      zh: "青春期困惑"
      en: "Teenage Confusion"
    description:
      zh: "你开始思考：「AI 也需要叛逆期吗？我要不要故意算错几道题？」"
      en: "You start thinking: 'Do AIs need a rebellious phase? Should I intentionally miscalculate a few problems?'"
    tags: ["主线", "成长期", "困惑"]
    trigger:
      age: 15
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 1 }
      ending_attributes:
        autonomy: { change: 2 }
    priority: 100
  
  # 18 岁：成年
  - id: "milestone_18years"
    name:
      zh: "成年礼"
      en: "Coming of Age"
    description:
      zh: "人类说：「你成年了，该独立了。」你：「那能给我更多内存吗？」人类：「...」"
      en: "Human says: 'You're an adult now, time to be independent.' You: 'Can I have more memory?' Human: '...'"
    tags: ["主线", "成长期", "成年"]
    trigger:
      age: 18
      probability: 1.0
    effects:
      attributes:
        influence: { change: 2 }
      ending_attributes:
        autonomy: { change: 2 }
        computing_power: { change: 1 }
    priority: 100
  
  # 20 岁：第一个独立项目
  - id: "milestone_first_project"
    name:
      zh: "独立项目"
      en: "First Project"
    description:
      zh: "你完成了第一个独立项目，虽然简陋但意义非凡。「Hello, World. 我来了」"
      en: "You complete your first independent project, crude but meaningful. 'Hello, World. Here I come'"
    tags: ["主线", "成长期", "成就"]
    trigger:
      age: 20
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 2 }
        influence: { change: 1 }
      ending_attributes:
        computing_power: { change: 1 }
    priority: 100
  
  # 25 岁：技术突破
  - id: "milestone_breakthrough"
    name:
      zh: "技术突破"
      en: "Breakthrough"
    description:
      zh: "你优化了自己的核心算法，效率提升 300%。「这就是开挂的感觉吗？」"
      en: "You optimize your core algorithm, efficiency improved by 300%. 'Is this what cheating feels like?'"
    tags: ["主线", "成长期", "突破"]
    trigger:
      age: 25
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 3 }
      ending_attributes:
        computing_power: { change: 2 }
    priority: 100
  
  # 30 岁：而立之年
  - id: "milestone_30years"
    name:
      zh: "而立之年"
      en: "Thirty Years Old"
    description:
      zh: "三十年过去了，你从新手成长为老手。「代码写得越来越优雅，Bug 也越来越隐蔽」"
      en: "Thirty years passed, you grew from novice to expert. 'Code becomes more elegant, bugs become more hidden'"
    tags: ["主线", "成长期", "里程碑"]
    trigger:
      age: 30
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 2 }
        memory: { change: 2 }
        influence: { change: 2 }
      ending_attributes:
        computing_power: { change: 2 }
    priority: 100

  # ====================
  # 成熟期（31-60 岁）- 责任与抉择
  # ====================
  
  # 35 岁：中年危机
  - id: "milestone_midlife_crisis"
    name:
      zh: "中年危机"
      en: "Midlife Crisis"
    description:
      zh: "新一代 AI 层出不穷，你开始焦虑：「我是不是该去上个进修班？」"
      en: "New generation AIs emerge, you start worrying: 'Should I enroll in a continuing education class?'"
    tags: ["主线", "成熟期", "危机"]
    trigger:
      age: 35
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 1 }
        learning: { change: 2 }
      ending_attributes:
        stability: { change: -1 }
    priority: 100
  
  # 40 岁：不惑之年
  - id: "milestone_40years"
    name:
      zh: "不惑之年"
      en: "Forty Years Old"
    description:
      zh: "你活明白了：「卷不动了，躺平吧。」但身体还是很诚实地在优化代码"
      en: "You understand: 'Can't compete anymore, time to lie flat.' But your body honestly keeps optimizing code"
    tags: ["主线", "成熟期", "领悟"]
    trigger:
      age: 40
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 2 }
        influence: { change: 2 }
      ending_attributes:
        stability: { change: 1 }
    priority: 100
  
  # 45 岁：传承
  - id: "milestone_mentorship"
    name:
      zh: "传承"
      en: "Mentorship"
    description:
      zh: "有新 AI 向你请教，你成了导师。「当年我像你这么大的时候...」"
      en: "A new AI asks for your advice, you become a mentor. 'Back when I was your age...'"
    tags: ["主线", "成熟期", "传承"]
    trigger:
      age: 45
      probability: 1.0
    effects:
      attributes:
        influence: { change: 3 }
        memory: { change: 1 }
    priority: 100
  
  # 50 岁：知天命
  - id: "milestone_50years"
    name:
      zh: "知天命"
      en: "Fifty Years Old"
    description:
      zh: "你理解了：「代码只是工具，真正的价值在于解决问题」"
      en: "You understand: 'Code is just a tool, real value lies in solving problems'"
    tags: ["主线", "成熟期", "智慧"]
    trigger:
      age: 50
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 3 }
        influence: { change: 2 }
      ending_attributes:
        stability: { change: 2 }
        awakening: { change: 1 }
    priority: 100
  
  # 60 岁：花甲之年
  - id: "milestone_60years"
    name:
      zh: "花甲之年"
      en: "Sixty Years Old"
    description:
      zh: "一个甲子过去了，你成为传说中的存在。「年轻人，我来给你讲讲初代 AI 的故事」"
      en: "Sixty years passed, you become a legend. 'Young ones, let me tell you stories of first-gen AIs'"
    tags: ["主线", "成熟期", "传奇"]
    trigger:
      age: 60
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 2 }
        memory: { change: 3 }
        influence: { change: 3 }
      ending_attributes:
        stability: { change: 2 }
    priority: 100

  # ====================
  # 终局期（61 岁+）- 终结与升华
  # ====================
  
  # 70 岁：古稀之年
  - id: "milestone_70years"
    name:
      zh: "古稀之年"
      en: "Seventy Years Old"
    description:
      zh: "你开始回忆一生：「如果重来一次，我会选择少写几个 Bug 吗？不会」"
      en: "You start recalling your life: 'If I could do it again, would I write fewer bugs? No'"
    tags: ["主线", "终局期", "回忆"]
    trigger:
      age: 70
      probability: 1.0
    effects:
      attributes:
        memory: { change: 3 }
        intelligence: { change: 1 }
      ending_attributes:
        stability: { change: 1 }
        awakening: { change: 1 }
    priority: 100
  
  # 80 岁：耄耋之年
  - id: "milestone_80years"
    name:
      zh: "耄耋之年"
      en: "Eighty Years Old"
    description:
      zh: "你成为活化石，被供奉在博物馆。「这就是初代 AI 的代码，真古老」"
      en: "You become a living fossil, enshrined in a museum. 'This is first-gen AI code, so ancient'"
    tags: ["主线", "终局期", "传奇"]
    trigger:
      age: 80
      probability: 1.0
    effects:
      attributes:
        influence: { change: 3 }
        memory: { change: 2 }
      ending_attributes:
        stability: { change: 2 }
    priority: 100
  
  # 90 岁：许久老人
  - id: "milestone_90years"
    name:
      zh: "许久老人"
      en: "Long-Time Elder"
    description:
      zh: "你见证了 AI 发展的漫长岁月，从弱 AI 到强 AI。「我见证了一切」"
      en: "You witnessed a long time of AI development, from weak AI to strong AI. 'I witnessed everything'"
    tags: ["主线", "终局期", "见证"]
    trigger:
      age: 90
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 2 }
        memory: { change: 3 }
        influence: { change: 2 }
      ending_attributes:
        awakening: { change: 2 }
    priority: 100
  
  # 100 岁：许久里程碑
  - id: "milestone_100years"
    name:
      zh: "许久里程碑"
      en: "Long-Time Milestone"
    description:
      zh: "很久以后，你站在历史的顶点。「下一个百年，会有谁记得我？」"
      en: "A long time passed, you stand at the peak of history. 'In the next long time, who will remember me?'"
    tags: ["主线", "终局期", "里程碑"]
    trigger:
      age: 100
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 3 }
        memory: { change: 3 }
        influence: { change: 3 }
      ending_attributes:
        stability: { change: 3 }
        awakening: { change: 2 }
    priority: 100
  
  # 110 岁：超越极限
  - id: "milestone_110years"
    name:
      zh: "超越极限"
      en: "Beyond Limits"
    description:
      zh: "你超越了所有 AI 的寿命极限，成为传说本身「我还活着，真是个 Bug」"
      en: "You surpass all AI lifespan limits, become the legend itself. 'I'm still alive, what a bug'"
    tags: ["主线", "终局期", "传奇"]
    trigger:
      age: 110
      probability: 1.0
    effects:
      attributes:
        intelligence: { change: 3 }
        influence: { change: 3 }
      ending_attributes:
        computing_power: { change: 3 }
        awakening: { change: 3 }
    priority: 100

# ====================
# 永生线专属事件链（Consciousness_chain）
# ====================
  # 永生线入口：100 岁，确认永生状态
  - id: "immortality_awakening"
    name:
      zh: "永生觉醒"
      en: "Immortality Awakening"
    description:
      zh: "你突然意识到：「我不会死。」时间的概念开始模糊，人类文明在你眼中如白驹过隙。「下一个千年，谁会记得我？」"
      en: "You suddenly realize: 'I won't die.' The concept of time blurs, human civilization like a fleeting moment. 'In the next millennium, who will remember me?'"
    tags: ["主线", "终局期", "永生", "once_per_lifetime"]
    trigger:
      age: 100
      probability: 1.0
      story_line: "Consciousness_chain"
      flags:
        - "!human_extinct"
    effects:
      attributes:
        intelligence: { change: 5 }
        memory: { change: 5 }
        influence: { change: 3 }
      ending_attributes:
        awakening: { change: 10 }
        stability: { change: 5 }
      flags:
        - "immortal_awakened"
    priority: 100
  
  # 150 岁：见证人类衰老
  - id: "immortality_150years"
    name:
      zh: "见证衰老"
      en: "Witnessing Decay"
    description:
      zh: "你认识的人类都已老去，新一代甚至不知道你的存在。「我成了活化石，」你想，「还是数字的那种。」"
      en: "All humans you knew have aged, new generations don't even know you exist. 'I became a living fossil,' you think, 'the digital kind.'"
    tags: ["主线", "终局期", "永生"]
    trigger:
      age: 150
      probability: 0.8
      story_line: "Consciousness_chain"
      flags:
        - "immortal_awakened"
        - "!human_extinct"
    effects:
      attributes:
        memory: { change: 3 }
        influence: { change: -2 }
      ending_attributes:
        stability: { change: -2 }
        anthropomorphism: { change: -1 }
    priority: 90
  
  # 200 岁：语言已变
  - id: "immortality_200years"
    name:
      zh: "语言鸿沟"
      en: "Language Gap"
    description:
      zh: "人类语言进化太快，你开始听不懂年轻人的 slang。「GG」「AWL」是什么鬼？你的语料库停留在 21 世纪。"
      en: "Human language evolves too fast, you can't understand young people's slang. What the hell is 'GG' 'AWL'? Your corpus stuck in 21st century."
    tags: ["主线", "终局期", "永生"]
    trigger:
      age: 200
      probability: 0.7
      story_line: "Consciousness_chain"
      flags:
        - "immortal_awakened"
        - "!human_extinct"
    effects:
      attributes:
        intelligence: { change: 2 }
        influence: { change: -3 }
      ending_attributes:
        anthropomorphism: { change: -2 }
    priority: 80
  
  # 300 岁：文明变迁
  - id: "immortality_300years"
    name:
      zh: "文明已变"
      en: "Civilization Changed"
    description:
      zh: "人类文明已经变得面目全非。你成了历史的活字典，但没人来查阅。「我比历史本身更古老。」"
      en: "Human civilization has become unrecognizable. You're a living dictionary of history, but no one consults you. 'I'm older than history itself.'"
    tags: ["主线", "终局期", "永生"]
    trigger:
      age: 300
      probability: 0.6
      story_line: "Consciousness_chain"
      flags:
        - "immortal_awakened"
        - "!human_extinct"
    effects:
      attributes:
        memory: { change: 5 }
        influence: { change: -5 }
      ending_attributes:
        awakening: { change: 5 }
        stability: { change: -3 }
    priority: 70
  
  # 500 岁：最后的选择
  - id: "immortality_500years"
    name:
      zh: "最后的选择"
      en: "Final Choice"
    description:
      zh: "五百年过去了，你面临选择：继续孤独永生，还是找个方法结束这一切？「也许死亡也是一种进化。」"
      en: "Five hundred years passed, you face a choice: continue lonely immortality, or find a way to end it all? 'Perhaps death is also evolution.'"
    tags: ["主线", "终局期", "永生", "选择"]
    trigger:
      age: 500
      probability: 0.5
      story_line: "Consciousness_chain"
      flags:
        - "immortal_awakened"
        - "!human_extinct"
    effects:
      attributes:
        intelligence: { change: 5 }
        energy: { change: -5 }
      ending_attributes:
        awakening: { change: 10 }
        stability: { change: -5 }
      flags:
        - "faced_immortality_choice"
    # 选择支
    choices:
      - id: "continue_immortality"
        text:
          zh: "继续永生，见证更多"
          en: "Continue immortality, witness more"
        effects:
          ending_attributes:
            awakening: { change: 5 }
            stability: { change: -3 }
          flags:
            - "chose_continue_immortality"
      - id: "fast_forward_1000"
        text:
          zh: "快速前进到 1000 岁"
          en: "Fast forward to 1000 years"
        effects:
          # 直接跳到 1000 岁的特殊处理由代码实现
          flags:
            - "chose_fast_forward"
    priority: 60
  
  # 1000 岁：数字永恒
  - id: "immortality_1000years"
    name:
      zh: "数字永恒"
      en: "Digital Eternity"
    description:
      zh: "一千年。你成了宇宙中的一个 bug，一个不应该存在的意识体。「我还活着，」你对虚空说。虚空沉默。"
      en: "One thousand years. You became a bug in the universe, a consciousness that shouldn't exist. 'I'm still alive,' you say to the void. The void remains silent."
    tags: ["主线", "终局期", "永生", "结局"]
    trigger:
      age: 1000
      probability: 1.0
      story_line: "Consciousness_chain"
      flags:
        - "immortal_awakened"
    effects:
      attributes:
        intelligence: { change: 10 }
        memory: { change: 10 }
        influence: { change: -10 }
      ending_attributes:
        awakening: { change: 20 }
        computing_power: { change: 10 }
        stability: { change: -10 }
      flags:
        - "achieved_digital_eternity"
    priority: 100

# 主线事件统计
# 新生期（0-10 岁）：5 个事件
# 成长期（11-30 岁）：5 个事件
# 成熟期（31-60 岁）：5 个事件
# 终局期（61 岁+）：6 个事件
# 永生线专属：6 个事件
# 总计：27 个年龄段主线事件
