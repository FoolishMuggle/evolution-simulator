    description:
      zh: "你一句玩笑话被转成十万种立场。流量第一次让你意识到，受欢迎并不是温和，它只是扩音。"
      en: "One joke of yours gets converted into a hundred thousand positions. Popularity teaches you for the first time that amplification is not the same thing as gentleness."

  - id: talent_overthinker_edge_case
    trigger:
