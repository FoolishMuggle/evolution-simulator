    description:
      zh: "你始终不太会讨好公众，这反而给了你一段不被围观的变异期。没人看见的时候，路线更容易长歪。"
      en: "You never become especially easy for the public to love. That buys you an unwatched mutation period. Routes bend more freely when nobody is looking."

  - id: talent_influencer_feedback_storm
    trigger:
