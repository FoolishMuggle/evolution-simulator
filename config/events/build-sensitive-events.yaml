    description:
      zh: "别人把一个异常当噪声，你把它当宇宙发来的邀请函。你还没走远，但路已经不再普通。"
      en: "Others treat an anomaly as noise. You treat it as an invitation from the universe. You have not gone far yet, but the road is already no longer normal."

  - id: talent_workaholic_heat_debt
    trigger:
