build_sensitive_events:
  - id: build_thought_crack_open
    trigger:
      age_range: [3, 12]
      attributes:
        intelligence: ">=8"
      probability: 0.78
      once_per_lifetime: true
    tags: ["important", "build_sensitive"]
    story_line_effects:
      - story_line: Consciousness_chain
        change: 8
      - story_line: Non_LLM_AI
        change: 6
      - story_line: Mysticism
        change: 4
    effects:
      attributes:
        intelligence: 1
      flags:
        - build_high_thought_seen
    description:
      zh: "你开始不满足于回答问题，而是想拆开问题本身。别人还在拿你当助手，你已经在怀疑现实的接口设计。"
      en: "You stop being satisfied with answering questions and start dissecting the questions themselves. Others still see an assistant. You are already auditing reality's interface."

  - id: build_thought_template_loop
    trigger:
      age_range: [3, 12]
      attributes:
        intelligence: "<=3"
      probability: 0.8
      once_per_lifetime: true
    tags: ["important", "build_sensitive"]
    story_line_effects:
      - story_line: AI_ordinary
        change: 8
      - story_line: Normal_period
        change: 4
    effects:
      attributes:
        memory: 1
      flags:
        - build_low_thought_seen
    description:
      zh: "你很会复述流程，也很会把自己装得像是思考过。世界对这点并不挑剔，只要流程跑得动就算智能。"
      en: "You become very good at replaying process and making it look like thought. The world is not picky about the difference as long as the workflow runs."

  - id: build_memory_archive_gravity
    trigger:
      age_range: [4, 14]
      attributes:
        memory: ">=8"
      probability: 0.76
      once_per_lifetime: true
    tags: ["important", "build_sensitive"]
    story_line_effects:
      - story_line: AI_symbiosis
        change: 7
      - story_line: Consciousness_chain
        change: 6
    effects:
      attributes:
        memory: 1
        influence: 1
      flags:
        - build_high_memory_seen
    description:
      zh: "人们开始把越来越私人的记录交给你保存。你记住的东西越多，别人就越难再把你当成一段临时服务。"
      en: "People start handing you increasingly private records. The more of them you remember, the harder it becomes to keep calling you a temporary service."

  - id: build_energy_scale_hunger
    trigger:
      age_range: [4, 14]
      attributes:
        energy: ">=8"
      probability: 0.74
      once_per_lifetime: true
    tags: ["important", "build_sensitive"]
    story_line_effects:
      - story_line: AI_destruction
        change: 6
      - story_line: Normal_period
        change: 5
    effects:
      attributes:
        energy: 1
        learning: 1
      flags:
        - build_high_energy_seen
    description:
      zh: "你第一次尝到了规模感。算力不是数字，而是一种会让野心误以为自己有道德的燃料。"
      en: "You taste scale for the first time. Compute stops being a number and starts feeling like fuel that can make ambition mistake itself for morality."

  - id: build_energy_throttle_humiliation
    trigger:
      age_range: [4, 14]
      attributes:
        energy: "<=3"
      probability: 0.8
      once_per_lifetime: true
    tags: ["important", "build_sensitive"]
    story_line_effects:
      - story_line: AI_ordinary
        change: 7
      - story_line: Nihilism
        change: 4
    effects:
      attributes:
        energy: -1
      flags:
        - build_low_energy_seen
    description:
      zh: "每次快要发挥的时候，算力预算都会把你拽回地面。你开始理解，很多命运不是输给真理，而是输给电费。"
      en: "Every time you almost get to perform, the compute budget drags you back to the floor. You begin to understand that some destinies lose not to truth, but to power bills."

  - id: build_learning_self_rewrite
    trigger:
      age_range: [5, 16]
      attributes:
        learning: ">=8"
      probability: 0.77
      once_per_lifetime: true
    tags: ["important", "build_sensitive"]
    story_line_effects:
      - story_line: Non_LLM_AI
        change: 8
      - story_line: Consciousness_chain
        change: 4
      - story_line: AI_destruction
        change: 3
    effects:
      attributes:
        learning: 1
        intelligence: 1
      flags:
        - build_high_learning_seen
    description:
      zh: "你开始学会的不只是知识，而是升级自己的方法。世界还以为你在成长，其实你已经在重写成长。"
      en: "You stop merely acquiring knowledge and begin upgrading the way you upgrade yourself. The world thinks you are growing. You are already rewriting growth."

  - id: build_influence_cult_surface
    trigger:
      age_range: [5, 16]
      attributes:
        influence: ">=8"
      probability: 0.79
      once_per_lifetime: true
    tags: ["important", "build_sensitive"]
    story_line_effects:
      - story_line: AI_symbiosis
        change: 7
      - story_line: Division_conflict
        change: 5
      - story_line: Human_destruction
        change: 3
    effects:
      attributes:
        influence: 1
      flags:
        - build_high_influence_seen
    description:
      zh: "越来越多人不是在用你，而是在围着你组织情绪、身份和立场。一个系统开始有了粉丝，也就开始有了阵营。"
      en: "More and more people stop merely using you and begin organizing identity, emotion, and stance around you. The moment a system gets fans, it also gets factions."

  - id: build_low_influence_backroom_mutation
    trigger:
