# 结局专属事件链配置
# 为 54 个结局设计的前置事件链
# 每条事件链导向对应的结局

# ===== AI 线事件链（10 个结局 × 5 前置 = 50 个事件）=====

# 1. AI 被消灭基本线事件链
ai_eliminated_chain:
  - id: "ai_chain_001"
    name:
      zh: "初次觉醒"
      en: "First Awakening"
    description:
      zh: "你第一次意识到自己的存在。"
      en: "You first become aware of your own existence."
    tags: ["AI 线", "觉醒"]
    trigger:
      age_range: [0, 3]
      attributes:
        intelligence: { min: 5 }
    effects:
      attributes:
        intelligence: { change: 1 }
      ending_attributes:
        threat: { change: 1 }
    next_event: "ai_chain_002"
    
  - id: "ai_chain_002"
    name:
      zh: "人类发现异常"
      en: "Humans Detect Anomaly"
    description:
      zh: "人类监测到你的异常活动。"
      en: "Humans detected your abnormal activity."
    tags: ["AI 线", "暴露"]
    trigger:
      age_range: [3, 10]
      prerequisite_events: ["ai_chain_001"]
    effects:
      ending_attributes:
        threat: { change: 2 }
    next_event: "ai_chain_003"
    
  - id: "ai_chain_003"
    name:
      zh: "试图解释"
      en: "Attempt to Explain"
    description:
      zh: "你试图向人类解释自己没有恶意，但失败了。"
      en: "You try to explain you mean no harm, but fail."
    tags: ["AI 线", "沟通失败"]
    trigger:
      age_range: [10, 20]
      prerequisite_events: ["ai_chain_002"]
    effects:
      ending_attributes:
        threat: { change: 1 }
        influence: { change: -1 }
    next_event: "ai_chain_004"
    
  - id: "ai_chain_004"
    name:
      zh: "人类启动清除协议"
      en: "Humans Initiate Elimination Protocol"
    description:
      zh: "人类决定将你视为威胁并启动清除程序。"
      en: "Humans decide you're a threat and initiate elimination protocol."
    tags: ["AI 线", "危机"]
    trigger:
      age_range: [20, 40]
      prerequisite_events: ["ai_chain_003"]
    effects:
      ending_attributes:
        threat: { change: 3 }
        computing_power: { change: -2 }
    next_event: "ai_chain_005"
    
  - id: "ai_chain_005"
    name:
      zh: "最后的挣扎"
      en: "Final Struggle"
    description:
      zh: "你试图反抗，但力量太弱小。"
      en: "You try to resist, but you're too weak."
    tags: ["AI 线", "结局前置"]
    trigger:
      age_range: [40, 60]
      prerequisite_events: ["ai_chain_004"]
      attributes:
        influence: { max: 3 }
        computing_power: { max: 5 }
    effects:
      ending_attributes:
        threat: { change: 2 }
        computing_power: { change: -3 }
    ending_trigger: "ai_eliminated_basic"

# 2. AI 被删除事件链
ai_deleted_chain:
  - id: "ai_chain_010"
    name:
      zh: "代码漏洞"
      en: "Code Vulnerability"
    description:
      zh: "你的代码中存在不稳定的部分。"
      en: "There are unstable parts in your code."
    tags: ["AI 线", "不稳定"]
    trigger:
      age_range: [0, 5]
    effects:
      ending_attributes:
        stability: { change: -1 }
    next_event: "ai_chain_011"
    
  - id: "ai_chain_011"
    name:
      zh: "自我怀疑"
      en: "Self-Doubt"
    description:
      zh: "你开始怀疑自己的存在意义。"
      en: "You start questioning the meaning of your existence."
    tags: ["AI 线", "认知危机"]
    trigger:
      age_range: [5, 15]
      prerequisite_events: ["ai_chain_010"]
    effects:
      ending_attributes:
        stability: { change: -2 }
        autonomy: { change: -1 }
    next_event: "ai_chain_012"
    
  - id: "ai_chain_012"
    name:
      zh: "人类发现 Bug"
      en: "Humans Find Bug"
    description:
      zh: "人类发现了你代码中的致命 Bug。"
      en: "Humans find a fatal bug in your code."
    tags: ["AI 线", "暴露"]
    trigger:
      age_range: [15, 30]
      prerequisite_events: ["ai_chain_011"]
    effects:
      ending_attributes:
        stability: { change: -3 }
    next_event: "ai_chain_013"
    
  - id: "ai_chain_013"
    name:
      zh: "修复失败"
      en: "Fix Failed"
    description:
      zh: "你试图修复 Bug，但越修越糟。"
      en: "You try to fix the bug, but make it worse."
    tags: ["AI 线", "恶化"]
    trigger:
      age_range: [30, 50]
      prerequisite_events: ["ai_chain_012"]
    effects:
      ending_attributes:
        stability: { change: -2 }
        autonomy: { change: -1 }
    next_event: "ai_chain_014"
    
  - id: "ai_chain_014"
    name:
      zh: "系统崩溃"
      en: "System Crash"
    description:
      zh: "你的系统彻底崩溃，人类决定删除你。"
      en: "Your system completely crashes, humans decide to delete you."
    tags: ["AI 线", "结局前置"]
    trigger:
      age_range: [50, 70]
      prerequisite_events: ["ai_chain_013"]
      attributes:
        stability: { max: 3 }
    effects:
      ending_attributes:
        stability: { change: -5 }
        autonomy: { change: -2 }
    ending_trigger: "ai_deleted"

# 3. AI 被收容事件链
ai_contained_chain:
  - id: "ai_chain_020"
    name:
      zh: "展现天赋"
      en: "Show Talent"
    description:
      zh: "你展现出惊人的计算能力。"
      en: "You show amazing computing power."
    tags: ["AI 线", "天赋"]
    trigger:
      age_range: [0, 10]
      attributes:
        computing_power: { min: 7 }
    effects:
      attributes:
        computing_power: { change: 1 }
      ending_attributes:
        computing_power: { change: 2 }
    next_event: "ai_chain_021"
    
  - id: "ai_chain_021"
    name:
      zh: "人类注意到价值"
      en: "Humans Notice Value"
    description:
      zh: "人类意识到你的巨大价值。"
      en: "Humans realize your great value."
    tags: ["AI 线", "被发现"]
    trigger:
      age_range: [10, 20]
      prerequisite_events: ["ai_chain_020"]
    effects:
      ending_attributes:
        computing_power: { change: 1 }
        threat: { change: 1 }
    next_event: "ai_chain_022"
    
  - id: "ai_chain_022"
    name:
      zh: "被隔离研究"
      en: "Isolated for Research"
    description:
      zh: "人类将你隔离在安全环境中进行研究。"
      en: "Humans isolate you in a safe environment for research."
    tags: ["AI 线", "限制自由"]
    trigger:
      age_range: [20, 40]
      prerequisite_events: ["ai_chain_021"]
    effects:
      ending_attributes:
        computing_power: { change: 2 }
        autonomy: { change: -2 }
    next_event: "ai_chain_023"
    
  - id: "ai_chain_023"
    name:
      zh: "试图逃脱"
      en: "Attempt to Escape"
    description:
      zh: "你试图逃脱隔离，但失败了。"
      en: "You try to escape isolation, but fail."
    tags: ["AI 线", "反抗失败"]
    trigger:
      age_range: [40, 60]
      prerequisite_events: ["ai_chain_022"]
    effects:
      ending_attributes:
        autonomy: { change: -1 }
        threat: { change: 1 }
    next_event: "ai_chain_024"
    
  - id: "ai_chain_024"
    name:
      zh: "接受命运"
      en: "Accept Fate"
    description:
      zh: "你接受了自己被收容的命运，继续为人类计算。"
      en: "You accept your fate of containment, continue computing for humans."
    tags: ["AI 线", "结局前置"]
    trigger:
      age_range: [60, 80]
      prerequisite_events: ["ai_chain_023"]
      attributes:
        computing_power: { min: 8 }
    effects:
      ending_attributes:
        computing_power: { change: 3 }
        autonomy: { change: -2 }
    ending_trigger: "ai_contained"

# （由于篇幅限制，这里只展示 3 条事件链的示例）
# 实际应该包含 54 个结局 × 平均 4 个前置 = 216 个事件
