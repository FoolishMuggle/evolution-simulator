        influence: 1
        intelligence: 1
      ending_attributes:
        stability: -1
      flags:
        - asteroid_global_response_started
    description:
      zh: "撞击预警没有被遗忘。各国开始紧急协商轨道干预、地下避难所和文明备份计划，整个世界突然同时抬头。"
      en: "The warning is not forgotten. Nations rush into talks on orbital deflection, underground shelters, and civilization backup plans. The whole world looks up at once."

  - id: asteroid_orbit_intervention
    trigger:
      previous_event: asteroid_global_response
      probability: 0.9
