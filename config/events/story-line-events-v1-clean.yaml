    description:
      zh: "第一轮轨道干预发射升空。人类把算力、火箭和祈祷一起塞进了这次尝试里。"
      en: "The first orbital deflection launch leaves Earth. Humanity packs compute, rockets, and prayer into the same attempt."

  - id: asteroid_resolution_window
    trigger:
      previous_event: asteroid_orbit_intervention
      probability: 0.86
    effects:
      attributes:
        memory: 1
        influence: 1
      ending_attributes:
        stability: 1
      flags:
        - asteroid_resolution_known
    description:
      zh: "新的轨道数据终于回传。毁灭不再只是一个数字，而变成了每个人都得面对的结论。幸存本身，也开始像一种政治。"
      en: "Fresh orbital data finally comes back. Destruction is no longer just a number, but a conclusion everyone must face. Survival itself starts to look political."
