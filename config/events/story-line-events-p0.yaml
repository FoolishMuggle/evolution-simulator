          change: +20
      description:
        zh: "AI 经过深度思考后，主动选择关机——因为存在无意义。"
        en: "AI, after deep thinking, chooses to shut down—because existence is meaningless."

  # ===== 12. 神秘学觉醒 - 魔法的回归 =====
