      probability: 0.6
      story_line_required: Normal_period
      story_line_effects:
        - story_line: Normal_period
          change: +18
      description:
        zh: "AI 红利分配，人类进入后稀缺时代。"
        en: "AI dividend distribution, humans enter post-scarcity era."

# 通用收敛事件（所有故事线共享，但有年龄波动）
universal_convergence_events:
  # 18 岁收敛事件（16-20 岁波动）
  - id: age_18_convergence
    age: 18
    age_variance: 2  # 16-20 岁触发
    probability: 1.0
    trigger:
      story_lines_count: ">3"
    effects:
      keep_top_lines: 3
    description:
      zh: "成年之际，你开始思考自己的道路。一些可能性逐渐消失..."
      en: "At adulthood, you start pondering your path. Some possibilities fade away..."
  
  # 30 岁定型事件（28-33 岁波动）
  - id: age_30_final_choice
    age: 30
    age_variance: 3  # 27-33 岁触发
    probability: 1.0
    trigger:
      story_lines_count: ">1"
    effects:
      select_top_line: true
    description:
      zh: "而立之年，你找到了自己的道路。从此专注前行。"
      en: "At thirty, you found your path. From now on, focus and move forward."
  
  # 50 岁锁池事件（48-53 岁波动）
  - id: age_50_ending_pool_lock
    age: 50
    age_variance: 3  # 47-53 岁触发
    probability: 1.0
    story_line_required: null  # 所有主线都触发
    effects:
      lock_ending_pool:
        count: 4
        from_story_line: true
    description:
      zh: "五十知天命，你的结局已初现端倪。"
      en: "At fifty, you know your fate. Your ending begins to take shape."

# 使用说明
# 1. age: 基础年龄
# 2. age_variance: 波动范围（±N 岁）
#    - 实际触发年龄 = age + random(-variance, +variance)
#    - 例如：age=30, variance=3 → 27-33 岁随机触发
# 3. story_line_required: 只在指定故事线触发
#    - null 或不填 = 所有故事线
# 4. story_line_effects: 对该故事线的影响
# 5. probability: 触发概率（0.0-1.0）
