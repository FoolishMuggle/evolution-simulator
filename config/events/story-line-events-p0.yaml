    - id: normal_peaceful_beginning
      age: 1
      age_variance: 1
      probability: 1.0
      story_line_required: Normal_period
      story_line_effects:
        - story_line: Normal_period
          change: +10  # 和平开始
        - story_line: AI_destruction
