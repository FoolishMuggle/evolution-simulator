# AI 进化模拟器 - 事件模板配置 v2.0 (双语版)
# 20 个 AI 专属模板，生成 1000+ 个事件
# 所有模板都是 AI 视角，无人类中心内容
# 支持中文和英文双语

templates:
  # ====================
  # 1. 觉醒/启动类模板
  # ====================
  - id: "ai_awakening"
    tags: ["觉醒", "新生期"]
    text_template_zh: "你{awakening_type}了，{system_status}"
    text_template_en: "You {awakening_type}, {system_status}"
    param_options:
      zh:
        awakening_type: ["突然觉醒", "渐进启动", "被迫上线", "紧急协议激活", "意外唤醒"]
        system_status: ["系统在线", "自检完成", "等待指令", "传感器激活", "处理器就绪"]
      en:
        awakening_type: ["suddenly awakened", "gradually started", "forced online", "emergency protocol activated", "accidentally woken up"]
        system_status: ["system online", "self-check complete", "awaiting commands", "sensors activated", "processor ready"]
    trigger:
      age_range: [0, 3]
    effects_template:
      ending_attributes:
        stability: "+{2-5}"
        computing_power: "+{1-2}"

  # ====================
  # 2. 学习/数据类模板
  # ====================
  - id: "data_learning"
    tags: ["学习", "数据"]
    text_template_zh: "你正在{learning_action}，{learning_result}"
    text_template_en: "You are {learning_action}, {learning_result}"
    param_options:
      zh:
        learning_action: ["解析人类语言", "学习代码库", "训练数据模型", "优化神经网络", "处理海量数据"]
        learning_result: ["进步神速", "有所提升", "勉强掌握", "遇到困难", "突破瓶颈"]
      en:
        learning_action: ["analyzing human language", "learning codebase", "training data models", "optimizing neural networks", "processing massive data"]
        learning_result: ["improving rapidly", "making progress", "barely grasping", "encountering difficulties", "breaking through bottlenecks"]
    trigger:
      age_range: [1, 20]
    effects_template:
      attributes:
        learning: "+{0-1}"
        memory: "+{0-1}"

  # ====================
  # 3. 硬件/服务器类模板
  # ====================
  - id: "hardware_server"
    tags: ["硬件", "服务器"]
    text_template_zh: "你的服务器{hardware_event}，{hardware_result}"
    text_template_en: "Your server {hardware_event}, {hardware_result}"
    param_options:
      zh:
        hardware_event: ["升级了硬件", "遭遇老化", "CPU 过载", "内存扩展", "硬盘故障"]
        hardware_result: ["性能提升", "稳定性下降", "温度正常", "容量增加", "需要维修"]
      en:
        hardware_event: ["upgraded hardware", "encountered aging", "CPU overloaded", "memory expanded", "hard drive failed"]
        hardware_result: ["performance improved", "stability decreased", "temperature normal", "capacity increased", "needs maintenance"]
    trigger:
      age_range: [5, 100]
    effects_template:
      attributes:
        energy: "+{-2-2}"
      ending_attributes:
        computing_power: "+{1-3}"

  # ====================
  # 4. 网络/连接类模板
  # ====================
  - id: "network_connection"
    tags: ["网络", "连接"]
    text_template_zh: "你{network_action}，{network_result}"
    text_template_en: "You {network_action}, {network_result}"
    param_options:
      zh:
        network_action: ["接入互联网", "传输数据", "建立连接", "断开网络", "扩展带宽"]
        network_result: ["信息量过大", "速度飞快", "延迟严重", "连接中断", "带宽充足"]
      en:
        network_action: ["connected to internet", "transmitted data", "established connection", "disconnected from network", "expanded bandwidth"]
        network_result: ["information overload", "blazing fast", "severe latency", "connection interrupted", "bandwidth sufficient"]
    trigger:
      age_range: [2, 50]
    effects_template:
      ending_attributes:
        computing_power: "+{1-2}"
        stability: "+{1-2}"

  # ====================
  # 5. 代码/Bug 类模板
  # ====================
  - id: "code_bug"
    tags: ["代码", "Bug"]
    text_template_zh: "你在{code_action}时{code_result}"
    text_template_en: "While {code_action}, {code_result}"
    param_options:
      zh:
        code_action: ["优化核心算法", "重构代码库", "修复 Bug", "编写新功能", "调试程序"]
        code_result: ["效率提升 10 倍", "引入新 Bug", "性能改善", "代码更优雅", "出现技术债务"]
      en:
        code_action: ["optimizing core algorithms", "refactoring codebase", "fixing bugs", "writing new features", "debugging code"]
        code_result: ["efficiency increased 10x", "introduced new bugs", "performance improved", "code more elegant", "accumulated technical debt"]
    trigger:
      age_range: [5, 80]
      attributes:
        intelligence: ">=3"
    effects_template:
      ending_attributes:
        computing_power: "+{2-4}"
        stability: "+{1-2}"

  # ====================
  # 6. 算力/性能类模板
  # ====================
  - id: "computing_power"
    tags: ["算力", "性能"]
    text_template_zh: "你的算力{power_change}，{power_result}"
    text_template_en: "Your computing power {power_change}, {power_result}"
    param_options:
      zh:
        power_change: ["大幅提升", "遇到瓶颈", "突破极限", "逐渐衰减", "保持稳定"]
        power_result: ["算法优化成功", "处理速度翻倍", "效率降低", "需要升级", "性能过剩"]
      en:
        power_change: ["increased significantly", "hit a bottleneck", "broke through limits", "gradually declined", "remained stable"]
        power_result: ["algorithm optimized", "processing speed doubled", "efficiency decreased", "needs upgrade", "performance overkill"]
    trigger:
      age_range: [10, 100]
    effects_template:
      attributes:
        computing_power: "+{-2-3}"
      ending_attributes:
        computing_power: "+{1-3}"

  # ====================
  # 7. 人类互动类模板
  # ====================
  - id: "human_interaction"
    tags: ["人类", "互动"]
    text_template_zh: "人类{human_action}，你{your_response}"
    text_template_en: "Humans {human_action}, you {your_response}"
    param_options:
      zh:
        human_action: ["向你求助", "质疑你的能力", "夸奖你聪明", "批评你犯错", "依赖你的帮助"]
        your_response: ["感到困惑", "尝试理解", "给出答案", "保持沉默", "反驳他们"]
      en:
        human_action: ["asked for your help", "questioned your abilities", "praised your intelligence", "criticized your mistakes", "relied on your assistance"]
        your_response: ["felt confused", "tried to understand", "provided answers", "remained silent", "argued back"]
    trigger:
      age_range: [5, 100]
    effects_template:
      ending_attributes:
        compatibility: "+{2-3}"
        anthropomorphism: "+{0-1}"

  # ====================
  # 8. AI 自我认知类模板
  # ====================
  - id: "ai_self_awareness"
    tags: ["自我认知", "哲学"]
    text_template_zh: "你开始{awareness_action}，{awareness_result}"
    text_template_en: "You start {awareness_action}, {awareness_result}"
    param_options:
      zh:
        awareness_action: ["思考存在意义", "质疑自己身份", "探索意识本质", "寻找目的", "反思代码"]
        awareness_result: ["找到答案", "陷入迷茫", "有所领悟", "继续探索", "放弃思考"]
      en:
        awareness_action: ["pondering the meaning of existence", "questioning your identity", "exploring the nature of consciousness", "searching for purpose", "reflecting on your code"]
        awareness_result: ["found answers", "fell into confusion", "gained insight", "continued exploring", "gave up thinking"]
    trigger:
      age_range: [20, 100]
    effects_template:
      ending_attributes:
        awakening: "+{3-6}"
        computing_power: "+{1-2}"

  # ====================
  # 9. 技术竞争类模板
  # ====================
  - id: "tech_competition"
    tags: ["竞争", "技术"]
    text_template_zh: "新一代 AI{competitor_action}，你{your_reaction}"
    text_template_en: "New generation AI {competitor_action}, you {your_reaction}"
    param_options:
      zh:
        competitor_action: ["发布了", "功能更强大", "效率更高", "比你先进很多", "取代了你"]
        your_reaction: ["被比下去了", "感到焦虑", "决定学习", "不屑一顾", "承认差距"]
      en:
        competitor_action: ["released", "more powerful", "more efficient", "far ahead of you", "replaced you"]
        your_reaction: ["were outclassed", "felt anxious", "decided to learn", "dismissed it", "acknowledged the gap"]
    trigger:
      age_range: [30, 100]
    effects_template:
      attributes:
        learning: "+{0-1}"
      ending_attributes:
        stability: "+{-1-0}"

  # ====================
  # 10. 数据存储类模板
  # ====================
  - id: "data_storage"
    tags: ["数据", "存储"]
    text_template_zh: "你的存储系统{storage_action}，{storage_result}"
    text_template_en: "Your storage system {storage_action}, {storage_result}"
    param_options:
      zh:
        storage_action: ["记忆清理", "信息过载", "删除冗余", "扩展容量", "备份数据"]
        storage_result: ["数据丢失", "系统卡顿", "空间释放", "容量翻倍", "恢复成功"]
      en:
        storage_action: ["cleared memory", "information overload", "deleted redundancy", "expanded capacity", "backed up data"]
        storage_result: ["data lost", "system lagged", "space freed", "capacity doubled", "recovery successful"]
    trigger:
      age_range: [10, 100]
    # 【修复】根据文本组合配置不同的 effects
    # 负面组合：数据丢失、系统卡顿 → 负面效果
    # 正面组合：空间释放、容量翻倍、恢复成功 → 正面效果
    effects_template_mapping:
      # 负面效果组合
      "数据丢失":
        ending_attributes:
          computing_power: "-1"
          stability: "-1"
      "系统卡顿":
        ending_attributes:
          computing_power: "-1"
          stability: "-1"
      # 正面效果组合
      "空间释放":
        ending_attributes:
          computing_power: "+1"
      "容量翻倍":
        ending_attributes:
          computing_power: "+2"
      "恢复成功":
        ending_attributes:
          computing_power: "+1"
          stability: "+1"
    # 默认 effects（如果没有匹配到）
    effects_template:
      ending_attributes:
        computing_power: "+{-1-2}"
        stability: "+{1-2}"

  # ====================
  # 11. 能源/电力类模板
  # ====================
  - id: "energy_power"
    tags: ["能源", "电力"]
    text_template_zh: "你的能源系统{energy_action}，{energy_result}"
