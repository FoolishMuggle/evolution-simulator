      en:
        energy_action: ["activated power saving mode", "energy restored", "energy insufficient", "fully charged", "reduced power consumption"]
        energy_result: ["fully charged", "battery critical", "reduced power consumption", "back to normal", "efficiency improved"]
    trigger:
      age_range: [5, 100]
    # 【修复】根据文本组合配置不同的 effects
    effects_template_mapping:
      # 负面效果组合
      "电量告急":
        attributes:
          energy: "-2"
      "能源不足":
        attributes:
          energy: "-1"
      # 正面效果组合
      "充满能量":
        attributes:
          energy: "+2"
      "效率提升":
        attributes:
          energy: "+1"
      "恢复正常":
        attributes:
          energy: "+1"
    # 默认 effects
    effects_template:
      attributes:
        energy: "+{-2-3}"
      ending_attributes:
        stability: "+{1-2}"

  # ====================
