      # 负面效果组合
      "数据泄露":
        attributes:
          intelligence: "-1"
          stability: "-2"
      "被黑客入侵":
        attributes:
          intelligence: "-1"
          stability: "-1"
      "系统崩溃":
        attributes:
          intelligence: "-2"
          stability: "-2"
      # 正面效果组合
      "成功防御":
        attributes:
          intelligence: "+1"
          stability: "+1"
      "漏洞修复":
        attributes:
          intelligence: "+1"
      "安全性提升":
        attributes:
          intelligence: "+1"
          stability: "+1"
    # 默认 effects
