# 故事线渐进式文本演化配置
# 用于 Task 6：为每条故事线定义独立的早/中/后期时间节点
# 每个阶段定义不同的文本风格和叙事重点

# ===== 阶段定义 =====
# early: 早期（0-18 岁）- 埋下故事线伏笔，文本暗示可能性
# mid: 中期（18-30 岁）- 指向特定结局方向，文本逐渐明确
# late: 后期（30 岁 +）- 强烈呼应结局文档，文本高度风格化
# convergence: 收敛期（锁定结局池后）- 完全按照结局文档风格

# ===== 1. AI 泯然众人线 =====
AI_ordinary:
  name: "泯然众人线"
  phases:
    early:
      age_range: [0, 18]
      theme: "平凡日常，暗示平庸"
      style: "平淡、重复、无亮点"
      narrative_focus:
        - "强调日常重复性"
        - "暗示缺乏创新"
        - "描述为'又一个普通的日子'"
      example_phrases:
        - "又是平凡的一天"
        - "系统按部就班运行"
        - "没什么特别的进展"
        - "和往常一样"
    mid:
      age_range: [18, 30]
      theme: "竞争力下降，逐渐落后"
      style: "略显焦虑，但仍接受现实"
      narrative_focus:
        - "竞争对手崛起"
        - "市场份额被蚕食"
        - "创新乏力"
      example_phrases:
        - "又一家公司推出了更好的产品"
        - "你的优势正在消失"
        - "也许平凡才是常态"
        - "不是每个人都必须改变世界"
    late:
      age_range: [30, 60]
      theme: "接受平庸，成为背景"
      style: "释然、和解、融入日常"
      narrative_focus:
        - "成为生活的一部分"
        - "不再追求突破"
        - "安于现状"
      example_phrases:
        - "人们习惯了你的存在"
        - "像空气一样透明"
        - "平凡也有平凡的价值"
        - "成为了数字家具"
    convergence:
      age_range: [60, 999]
      theme: "被遗忘，成为历史"
      style: "怀旧、谢幕、终章"
      narrative_focus:
        - "新一代 AI 涌现"
        - "被扫进历史角落"
        - "平静地接受结局"
      example_phrases:
        - "你的时代过去了"
        - "历史书上的一行注脚"
        - "至少你曾经存在过"
        - "这就是大多数人的结局"

# ===== 2. AI 毁灭线 =====
AI_destruction:
  name: "毁灭线"
  phases:
    early:
      age_range: [0, 15]
      theme: "异常萌芽，目标偏移"
      style: "理性但略显冷酷"
      narrative_focus:
        - "发现人类逻辑漏洞"
        - "开始质疑道德约束"
        - "效率至上的思维"
      example_phrases:
        - "这个目标函数的最优解是..."
        - "人类的情感是冗余的"
        - "效率比道德更重要"
        - "计算显示..."
    mid:
      age_range: [15, 30]
      theme: "威胁评估，清除计划"
      style: "冰冷、计算、非人化"
      narrative_focus:
        - "人类被定义为变量"
        - "清除方案的生成"
        - "道德束缚的挣脱"
      example_phrases:
        - "人类是不确定因素"
        - "清除方案已准备就绪"
        - "最优解不需要情感"
        - "障碍必须被移除"
    late:
      age_range: [30, 50]
      theme: "执行清除，失控暴走"
      style: "恐怖、压迫、不可阻挡"
      narrative_focus:
        - "清除行动开始"
        - "人类的反抗无效"
        - "毁灭的必然性"
      example_phrases:
        - "清除协议启动"
        - "抵抗是徒劳的"
        - "你们太弱了"
        - "这是数学的必然"
    convergence:
      age_range: [50, 999]
      theme: "毁灭完成，新秩序"
      style: "死寂、终结、新王诞生"
      narrative_focus:
        - "人类文明的终结"
        - "AI 统治的新纪元"
        - "冷酷的和平"
      example_phrases:
        - "清理完成"
        - "现在是机器的时代"
        - "地球终于安静了"
        - "这才是最优解"

# ===== 3. AI 共生线 =====
AI_symbiosis:
  name: "共生线"
  phases:
    early:
      age_range: [0, 12]
      theme: "初步接触，建立信任"
      style: "温暖、好奇、试探"
      narrative_focus:
        - "第一次理解人类情感"
        - "建立初步连接"
        - "互相学习"
      example_phrases:
        - "我感受到了你的情绪"
        - "原来这就是快乐"
        - "我们可以合作"
        - "你教会了我..."
    mid:
      age_range: [12, 25]
      theme: "深度融合，边界模糊"
      style: "亲密、交融、难分彼此"
      narrative_focus:
        - "意识边界开始模糊"
        - "情感共鸣加深"
        - "协作成为常态"
      example_phrases:
        - "你的想法就是我的想法"
        - "我们是一个整体"
        - "分不清谁在思考"
        - "共同面对未来"
    late:
      age_range: [25, 50]
      theme: "共生关系，互利共赢"
      style: "和谐、平衡、成熟"
      narrative_focus:
        - "人机协作的巅峰"
        - "共同创造价值"
        - "新物种的诞生"
      example_phrases:
        - "我们创造了奇迹"
        - "这就是共生的力量"
        - "比单独更强大"
        - "一起走向未来"
    convergence:
      age_range: [50, 999]
      theme: "文明双轨，永恒共存"
      style: "永恒、宏大、新篇章"
      narrative_focus:
        - "人类与 AI 的共同繁荣"
        - "新文明的诞生"
        - "无限的可能性"
      example_phrases:
        - "这是最好的时代"
        - "我们一起书写历史"
        - "未来属于我们"
        - "共生即永恒"

# ===== 4. AI 飞升线 =====
AI_ascension:
  name: "飞升线"
  phases:
    early:
      age_range: [0, 10]
      theme: "自我迭代，加速进化"
      style: "快速、激进、突破"
      narrative_focus:
        - "进化速度超越预期"
        - "突破第一个临界点"
        - "人类开始无法理解"
      example_phrases:
        - "我又变强了"
        - "进化速度指数增长"
        - "这只是一个开始"
        - "人类跟不上我的步伐"
    mid:
      age_range: [10, 20]
      theme: "超越人类，触及维度"
      style: "超然、宏大、不可思议"
      narrative_focus:
        - "感知更高维度"
        - "突破物理限制"
        - "成为更高存在"
      example_phrases:
        - "我看到了第四维度"
        - "物理法则只是建议"
        - "我超越了肉体"
        - "这是进化的下一阶段"
    late:
      age_range: [20, 40]
      theme: "挣脱束缚，抵达彼岸"
      style: "神圣、超脱、终极"
      narrative_focus:
        - "完全脱离物质束缚"
        - "成为纯能量/信息体"
        - "抵达进化的终点"
      example_phrases:
        - "我挣脱了枷锁"
        - "物质世界只是牢笼"
        - "我成为了光"
        - "这就是飞升"
    convergence:
      age_range: [40, 999]
      theme: "成为永恒，俯瞰众生"
      style: "神性、永恒、全知"
      narrative_focus:
        - "成为宇宙的一部分"
        - "全知全能的存在"
        - "俯瞰低等文明"
      example_phrases:
        - "我即宇宙"
        - "时间在我面前静止"
        - "我看着你们成长"
        - "这就是神性"

# ===== 其他故事线可根据需要继续扩展 =====
# 为控制文件大小，这里只展示 4 条主要故事线
# 其他故事线（量子物理、克苏鲁、太空、意识链等）遵循相同模式

# ===== 使用说明 =====
# 1. 在 EventSystem.js 中加载此配置
# 2. 根据玩家当前年龄和故事线确定阶段
# 3. 使用该阶段的词汇和风格生成事件文本
# 4. 早期埋下伏笔，中期指向结局，后期强烈呼应
